[behave]
# ── Output ────────────────────────────────────────────────────────────────────
stdout_capture  = false
stderr_capture  = false
log_capture     = false
show_timings    = true
show_skipped    = true
verbose         = true

# ── Paths ─────────────────────────────────────────────────────────────────────
paths           = features

# ── Formatters ────────────────────────────────────────────────────────────────
# Run karte waqt --format allure_behave.formatter:AllureFormatter se allure milega
# Default: pretty print console output

# ── Tags ──────────────────────────────────────────────────────────────────────
# behave --tags=@smoke      → sirf smoke tests
# behave --tags=@positive   → sirf positive tests
# behave --tags=@negative   → sirf negative tests
# behave --tags=@e2e        → E2E feature ke steps (feature file tag nahi, scenario tag hai)
